name: Production Release

on:
  push:
    tags:
      - '*-prod' # Triggers on v1.0-prod, 2.4.5-prod, etc.

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract Tag Name
        id: get_version
        # This strips 'refs/tags/' to get just the tag name
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tags the image with your Git tag (e.g., myuser/nutrix-docs:v1.0-prod)
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nutrix-docs:${{ steps.get_version.outputs.version }}

      - name: Checkout Manifest Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.INFRA_REPO}}
          token: ${{ secrets.INFRA_REPO_FGT }}
          path: manifests

      - name: Update K8s Manifest
        run: |
          cd manifests
          # Dynamically update the image tag to the new prod version
          sed -i "s|image: .*/nutrix-docs:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/nutrix-docs:${{ steps.get_version.outputs.version }}|g" deployment.yaml
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployment.yaml
          git commit -m "prod-release: nutrix-docs to ${{ steps.get_version.outputs.version }}"
          git push